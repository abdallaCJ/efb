<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Premier League Dashboard</title>
    <style>
        :root {
            --pl-purple: #3d195d;
            --pl-dark: #130021;
            --pl-neon: #00ff87;
            --pl-text: #ffffff;
            --pl-card: #1f0b35;
            --pl-border: #4d2b6e;
            --win-color: #00ff87;
            --draw-color: #76766f;
            --loss-color: #d81920;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: var(--pl-dark);
            color: var(--pl-text);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 20px 0;
            background: linear-gradient(135deg, var(--pl-purple), var(--pl-dark));
            border-bottom: 4px solid var(--pl-neon);
            margin-bottom: 40px;
            border-radius: 8px;
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        header h1 span {
            color: var(--pl-neon);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .groups-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 1024px) {
            .groups-wrapper { grid-template-columns: 1fr; }
        }

        .group-section {
            background-color: var(--pl-card);
            border: 1px solid var(--pl-border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        h2 {
            font-size: 1.6rem;
            color: var(--pl-text);
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 24px;
            background-color: var(--pl-neon);
            border-radius: 2px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        th {
            background-color: rgba(0,0,0,0.2);
            color: #bfa1db;
            font-weight: 600;
            padding: 12px 8px;
            text-align: center;
            font-size: 0.8rem;
            text-transform: uppercase;
            border-bottom: 2px solid var(--pl-border);
        }

        th.left-align, td.left-align {
            text-align: left;
        }

        td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        tr.ucl-spot td:first-child {
            border-left: 4px solid var(--pl-neon);
        }

        .pos-num {
            font-weight: bold;
        }

        .player-name {
            font-weight: 700;
            color: #fff;
        }

        .pts-col {
            font-weight: bold;
            color: var(--pl-neon);
        }

        /* Form Circles */
        .form-container {
            display: flex;
            gap: 4px;
            justify-content: center;
        }

        .form-circle {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 0.7rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--pl-dark);
        }
        .form-W { background-color: var(--win-color); }
        .form-D { background-color: var(--draw-color); color: #fff; }
        .form-L { background-color: var(--loss-color); color: #fff; }

        /* Fixtures UI styling */
        h3 {
            color: #bfa1db;
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .fixtures {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .match {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 10px 16px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .match:hover {
            border-color: var(--pl-border);
        }

        .team-name {
            flex: 1;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .team-name.right { text-align: right; }

        .score-box {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--pl-dark);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--pl-border);
        }

        input[type="number"] {
            width: 30px;
            background: transparent;
            border: none;
            color: #fff;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }
        
        input[type="number"]:focus {
            outline: none;
        }

        .vs-text {
            color: #bfa1db;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 0 4px;
        }
    </style>
</head>
<body>

    <header>
        <h1>eFootball <span>efootball leauge</span> Center</h1>
    </header>

    <div class="container">
        <div class="groups-wrapper">
            
            <!-- GROUP 1 -->
            <div class="group-section">
                <h2>League Table - Group 1</h2>
                <table>
                    <thead>
                        <tr>
                            <th style="width: 40px;">Pos</th>
                            <th class="left-align">Player</th>
                            <th style="width: 40px;">PL</th>
                            <th style="width: 40px;">W</th>
                            <th style="width: 40px;">D</th>
                            <th style="width: 40px;">L</th>
                            <th style="width: 40px;">GF</th>
                            <th style="width: 40px;">GA</th>
                            <th style="width: 40px;">GD</th>
                            <th style="width: 50px;">Pts</th>
                            <th style="width: 120px;">Form</th>
                        </tr>
                    </thead>
                    <tbody id="table-g1"></tbody>
                </table>
                <h3>Fixtures & Results</h3>
                <div class="fixtures" id="fixtures-g1"></div>
            </div>

            <!-- GROUP 2 -->
            <div class="group-section">
                <h2>League Table - Group 2</h2>
                <table>
                    <thead>
                        <tr>
                            <th style="width: 40px;">Pos</th>
                            <th class="left-align">Player</th>
                            <th style="width: 40px;">PL</th>
                            <th style="width: 40px;">W</th>
                            <th style="width: 40px;">D</th>
                            <th style="width: 40px;">L</th>
                            <th style="width: 40px;">GF</th>
                            <th style="width: 40px;">GA</th>
                            <th style="width: 40px;">GD</th>
                            <th style="width: 50px;">Pts</th>
                            <th style="width: 120px;">Form</th>
                        </tr>
                    </thead>
                    <tbody id="table-g2"></tbody>
                </table>
                <h3>Fixtures & Results</h3>
                <div class="fixtures" id="fixtures-g2"></div>
            </div>

        </div>
    </div>

    <script>
        // Replace these with your actual participant names
        const playersG1 = ["guduudow ", "muse", "qaloociye", "cj.ahmed", "ciise"];
        const playersG2 = ["mohamed mj", "maan", "suunyo xiir", "delight", "sadiiq"];

        function generateSchedule(players) {
            const pairs = [
                [0, 3], [1, 2],
                [0, 4], [2, 3],
                [1, 4], [0, 2],
                [1, 3], [2, 4],
                [0, 1], [3, 4]
            ];
            return pairs.map(p => ({ p1: players[p[0]], p2: players[p[1]], s1: null, s2: null }));
        }

       // Manually entered matches and scores for Group 1
let matchesG1 = [
    { p1: "guduudow", p2: "cj.ahmed", s1: null,    s2: null },    // player1 won 3-1
    { p1: "muse", p2: "qaloociye", s1: null,    s2: null },    // 0-0 Draw
    { p1: "guduudow", p2: "ciise", s1: null, s2: null }, // unplayed match
    { p1: "qaloociye", p2: "cj.ahmed", s1: null, s2: null },
    { p1: "muse", p2: "ciise", s1: null, s2: null },
    { p1: "guduudow", p2: "qaloociye", s1: null, s2: null },
    { p1: "muse", p2: "cj.ahmed", s1: null, s2: null },
    { p1: "qaloociye", p2: "ciise", s1: null, s2: null },
    { p1: "guduudow", p2: "muse", s1: null, s2: null },
    { p1: "cj.ahmed", p2: "ciise", s1: null, s2: null }
];

// Manually entered matches and scores for Group 2
let matchesG2 = [
    { p1: "mohamed mj", p2: "delight", s1: null,    s2: null },    // player4 won 4-2
    { p1: "maan", p2: "suunyo xiir", s1: null, s2: null },
    { p1: "mohamed mj", p2: "sadiiq", s1: null, s2: null },
    { p1: "suunyo xiir", p2: "delight", s1: null, s2: null },
    { p1: "maan", p2: "sadiiq", s1: null, s2: null },
    { p1: "mohamed mj", p2: "suunyo xiir", s1: null, s2: null },
    { p1: "maan", p2: "delight", s1: null, s2: null },
    { p1: "suunyo xiir", p2: "sadiiq", s1: null, s2: null },
    { p1: "mohamed mj", p2: "maan", s1: null, s2: null },
    { p1: "delight", p2: "sadiiq", s1: null, s2: null }
];


        function updateTournament() {
            renderTable('table-g1', playersG1, matchesG1);
            renderTable('table-g2', playersG2, matchesG2);
        }

        function renderTable(tableId, players, matches) {
            let stats = {};
            players.forEach(p => stats[p] = { name: p, p:0, w:0, d:0, l:0, gf:0, ga:0, pts:0, form: [] });

            matches.forEach(m => {
                if(m.s1 !== null && m.s2 !== null) {
                    stats[m.p1].p++; stats[m.p2].p++;
                    stats[m.p1].gf += m.s1; stats[m.p1].ga += m.s2;
                    stats[m.p2].gf += m.s2; stats[m.p2].ga += m.s1;
                    
                    if(m.s1 > m.s2) { 
                        stats[m.p1].w++; stats[m.p1].pts += 3; stats[m.p1].form.push('W');
                        stats[m.p2].l++; stats[m.p2].form.push('L');
                    } else if(m.s1 < m.s2) { 
                        stats[m.p2].w++; stats[m.p2].pts += 3; stats[m.p2].form.push('W');
                        stats[m.p1].l++; stats[m.p1].form.push('L');
                    } else { 
                        stats[m.p1].d++; stats[m.p1].pts++; stats[m.p1].form.push('D');
                        stats[m.p2].d++; stats[m.p2].pts++; stats[m.p2].form.push('D');
                    }
                }
            });

            let sorted = Object.values(stats).sort((a,b) => b.pts - a.pts || (b.gf - b.ga) - (a.gf - a.ga) || b.gf - a.gf);
            
            let tbody = document.getElementById(tableId);
            tbody.innerHTML = sorted.map((p, idx) => {
                let formHtml = p.form.slice(-5).map(f => `<div class="form-circle form-${f}">${f}</div>`).join('');
                return `
                    <tr class="${idx < 2 ? 'ucl-spot' : ''}">
                        <td class="pos-num">${idx + 1}</td>
                        <td class="left-align player-name">${p.name}</td>
                        <td>${p.p}</td>
                        <td>${p.w}</td>
                        <td>${p.d}</td>
                        <td>${p.l}</td>
                        <td>${p.gf}</td>
                        <td>${p.ga}</td>
                        <td>${p.gf - p.ga >= 0 ? '+' : ''}${p.gf - p.ga}</td>
                        <td class="pts-col">${p.pts}</td>
                        <td><div class="form-container">${formHtml || '-'}</div></td>
                    </tr>
                `;
            }).join('');
        }

        function renderFixtures(containerId, matches, updateKey) {
            let container = document.getElementById(containerId);
            container.innerHTML = matches.map((m, idx) => `
                <div class="match">
                    <span class="team-name">${m.p1}</span>
                    <div class="score-box">
                        <input type="number" min="0" value="${m.s1 !== null ? m.s1 : ''}" oninput="updateScore('${updateKey}', ${idx}, 1, this.value)">
                        <span class="vs-text">vs</span>
                        <input type="number" min="0" value="${m.s2 !== null ? m.s2 : ''}" oninput="updateScore('${updateKey}', ${idx}, 2, this.value)">
                    </div>
                    <span class="team-name right">${m.p2}</span>
                </div>
            `).join('');
        }

        window.updateScore = function(group, idx, teamNum, val) {
            let list = group === 'G1' ? matchesG1 : matchesG2;
            let score = val === "" ? null : parseInt(val);
            if(teamNum === 1) list[idx].s1 = score;
            else list[idx].s2 = score;
            updateTournament();
        }

        renderFixtures('fixtures-g1', matchesG1, 'G1');
        renderFixtures('fixtures-g2', matchesG2, 'G2');
        updateTournament();
    </script>
</body>
</html>
